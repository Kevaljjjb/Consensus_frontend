<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #000000 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Background pattern for demo */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 60px 60px;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-10px, -10px); }
        }

        /* Chat Toggle Button */
        .chat-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .chat-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: #000;
            transition: transform 0.3s ease;
        }

        .chat-toggle.active svg {
            transform: rotate(45deg);
        }

        /* Chat Container */
        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 380px;
            height: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transform: translateY(100%) scale(0.8);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .chat-container.active {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        /* Chat Header */
        .chat-header {
            padding: 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #000;
            font-size: 14px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            padding: 0 20px 20px 20px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.3) transparent;
            min-height: 0;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideInUp 0.3s ease;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
            justify-content: flex-start;
            margin-left: auto;
            align-items: flex-end;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #000;
            flex-shrink: 0;
        }

        .message-content {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 16px;
            color: #000;
            font-size: 13px;
            line-height: 1.4;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            word-wrap: break-word;
            overflow-wrap: break-word;
            align-self: flex-start;
        }

        .message.user .message-content {
            background: rgba(0, 0, 0, 0.1); 
            border: 1px solid rgba(0, 0, 0, 0.2);
            margin-left: auto;
            font-weight: 500;
        }

        /* Markdown Styles for AI Messages */
        .message-content.markdown h1,
        .message-content.markdown h2,
        .message-content.markdown h3,
        .message-content.markdown h4,
        .message-content.markdown h5,
        .message-content.markdown h6 {
            margin: 12px 0 8px 0;
            font-weight: 600;
            line-height: 1.3;
        }

        .message-content.markdown h1 { font-size: 1.5em; }
        .message-content.markdown h2 { font-size: 1.3em; }
        .message-content.markdown h3 { font-size: 1.1em; }
        .message-content.markdown h4 { font-size: 1em; }
        .message-content.markdown h5 { font-size: 0.9em; }
        .message-content.markdown h6 { font-size: 0.85em; }

        .message-content.markdown p {
            margin: 8px 0;
        }

        .message-content.markdown ul,
        .message-content.markdown ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content.markdown li {
            margin: 4px 0;
        }

        .message-content.markdown code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message-content.markdown pre {
            background: rgba(0, 0, 0, 0.1);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content.markdown pre code {
            background: none;
            padding: 0;
        }

        .message-content.markdown blockquote {
            border-left: 3px solid rgba(0, 0, 0, 0.3);
            padding-left: 12px;
            margin: 8px 0;
            font-style: italic;
            opacity: 0.9;
        }

        .message-content.markdown a {
            color: #0066cc;
            text-decoration: underline;
        }

        .message-content.markdown a:hover {
            opacity: 0.8;
        }

        .message-content.markdown strong {
            font-weight: 600;
        }

        .message-content.markdown em {
            font-style: italic;
        }

        .message-content.markdown hr {
            border: none;
            border-top: 1px solid rgba(0, 0, 0, 0.2);
            margin: 12px 0;
        }

        .message-content.markdown table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
        }

        .message-content.markdown th,
        .message-content.markdown td {
            border: 1px solid rgba(0, 0, 0, 0.2);
            padding: 6px 8px;
            text-align: left;
        }

        .message-content.markdown th {
            background: rgba(0, 0, 0, 0.05);
            font-weight: 600;
        }

        .message-content.markdown img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 8px 0;
        }

        .timestamp {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.5);
            margin-top: 4px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .typing-indicator.active {
            opacity: 1;
        }

        .typing-dots {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 18px;
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Chat Input */
        .chat-input {
            padding: 16px 20px 20px 20px;
            background: transparent;
            border: none;
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 12px 16px;
            color: #000;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            max-height: 100px;
            min-height: 44px;
        }

        .input-field::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        .input-field:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.25);
        }

        .send-button {
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button:hover {
            background: rgba(0, 0, 0, 0.15);
            transform: scale(1.05);
        }

        .send-button svg {
            width: 20px;
            height: 20px;
            fill: #000;
        }

        /* Responsive Design */
        @media (max-width: 420px) {
            .chat-container {
                right: 12px;
                left: 12px;
                width: auto;
                bottom: 90px;
            }
            
            .chat-toggle {
                right: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Demo content to show transparency -->
    <div style="position: absolute; top: 50px; left: 50px; color: white; font-size: 24px; z-index: 1;">
        Website Content Here
    </div>
    <div style="position: absolute; top: 200px; right: 100px; color: white; font-size: 18px; z-index: 1;">
        Background Content Visible Through Glass
    </div>

    <!-- Chat Toggle Button -->
    <div class="chat-toggle" id="chatToggle">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
        </svg>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <!-- Chat Header -->
        <div class="chat-header">
            <div class="avatar">AI</div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="message">
                <div class="message-avatar">AI</div>
                <div>
                    <div class="message-content markdown">
                        <p>Hi there! 👋 Welcome to our website. How can I help you today?</p>
                    </div>
                    <div class="timestamp">Just now</div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator message" id="typingIndicator">
                <div class="message-avatar">AI</div>
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input">
            <div class="input-container">
                <textarea class="input-field" id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                <button class="send-button" id="sendButton">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Chat functionality
        const chatToggle = document.getElementById('chatToggle');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const chatMessages = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');

        let isOpen = false;

        // Configure marked options for better markdown rendering
        marked.setOptions({
            breaks: true, // Enable line breaks
            gfm: true, // GitHub Flavored Markdown
            headerIds: false, // Don't add IDs to headers
            mangle: false // Don't mangle email addresses
        });

        // Toggle chat
        chatToggle.addEventListener('click', () => {
            isOpen = !isOpen;
            chatContainer.classList.toggle('active', isOpen);
            chatToggle.classList.toggle('active', isOpen);
            
            if (isOpen) {
                messageInput.focus();
            }
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = '44px';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Send message
        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = '44px';

            // Show typing indicator
            showTypingIndicator();

            // Send message to backend
            fetch('http://127.0.0.1:5000/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message, company_id: 1 })
            })
            .then(response => response.json())
            .then(data => {
                hideTypingIndicator();
                addMessage(data.reply, 'bot');
            })
            .catch(error => {
                hideTypingIndicator();
                console.error('Error:', error);
                addMessage("Sorry, something went wrong. Please try again later.", 'bot');
            });
        }

        // Add message to chat with markdown support
        function addMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const now = new Date();
            const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Process content based on sender
            let processedContent = content;
            let contentClass = 'message-content';
            
            if (sender === 'bot' || sender === 'AI') {
                // Parse markdown for bot messages
                processedContent = marked.parse(content);
                contentClass = 'message-content markdown';
            } else {
                // Escape HTML for user messages
                processedContent = escapeHtml(content);
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${sender === 'user' ? 'You' : 'AI'}</div>
                <div>
                    <div class="${contentClass}">${processedContent}</div>
                    <div class="timestamp">${timeString}</div>
                </div>
            `;
            
            // Insert before typing indicator or append to end
            const messagesContainer = document.getElementById('chatMessages');
            const typingElement = document.getElementById('typingIndicator');
            
            if (typingElement && messagesContainer.contains(typingElement)) {
                messagesContainer.insertBefore(messageDiv, typingElement);
            } else {
                messagesContainer.appendChild(messageDiv);
            }
            
            // Scroll to bottom
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 10);
        }

        // Escape HTML function for user messages
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Show/hide typing indicator
        function showTypingIndicator() {
            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTypingIndicator() {
            typingIndicator.classList.remove('active');
        }

        // Send button click
        sendButton.addEventListener('click', sendMessage);

        // Enter key to send
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Close chat when clicking outside
        document.addEventListener('click', (e) => {
            if (isOpen && !chatContainer.contains(e.target) && !chatToggle.contains(e.target)) {
                isOpen = false;
                chatContainer.classList.remove('active');
                chatToggle.classList.remove('active');
            }
        });

        // Example: Add a test message with markdown formatting
        // Uncomment this to see markdown rendering in action
        /*
        setTimeout(() => {
            const markdownExample = `
# Welcome to Our Service!

1. **Real-time** chat support
2. *Markdown* formatting support
3. Code snippets: \`const greeting = "Hello!";\`

- [Support](https://example.com/support)

> "We're here to help you 24/7"

\`\`\`javascript
// Example code block
function greet(name) {
    return \`Hello, \${name}!\`;
}
\`\`\`

Feel free to ask me anything!
            `;
            addMessage(markdownExample, 'bot');
        }, 2000);
        */
    </script>
</body>
</html>
